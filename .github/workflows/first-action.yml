name: My First GitHub Action

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  test-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Print GitHub Information
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          echo "Triggered By: ${{ github.actor }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "SHA: ${{ github.sha }}"
          echo "actor_id: ${{ github.actor_id }}"
          echo "the_event_name: ${{ github.event_name }}"
          echo "server_url: ${{ github.server_url }}"
          

      - name: List Repository Files
        run: ls -la

      - name: Print Date
        run: date

      - name: Success Message
        run: |
          echo "::notice:: GitHub Actions is working!"
          echo "::debug:: GitHub Actions is working!"
